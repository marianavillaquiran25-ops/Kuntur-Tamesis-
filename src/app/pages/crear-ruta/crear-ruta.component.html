<div class="dashboard">

  <main class="contenido">

    <!-- HERO -->
    <div class="hero">

      <button class="btn-volver" (click)="irAVerRutas()">
        ⬅︎
      </button>

      <div class="overlay">
        <h1>Crear nueva ruta turística</h1>
        <p>Administra nuevas experiencias turísticas en Kuntur Támesis</p>
      </div>

    </div>

    <!-- MENSAJE -->
    <div *ngIf="mensajeExito" class="mensaje-exito">
      ✅ Ruta creada correctamente
    </div>

    <!-- FORM -->
    <div class="form-container">

      <div class="form-grid">

        <div class="input-group">
          <label>Nombre de la ruta</label>
          <input type="text" [(ngModel)]="ruta.nombre" placeholder="Ej: Cerro Cristo Rey">
        </div>

        <div class="input-group">
          <label>Destino</label>
          <input type="text" [(ngModel)]="ruta.destino" placeholder="Ej: Támesis Antioquia">
        </div>

        <div class="input-group">
          <label>Precio</label>
          <input type="number" [(ngModel)]="ruta.precio" placeholder="150000">
        </div>

        <div class="input-group">
          <label>Duración</label>
          <input type="text" [(ngModel)]="ruta.duracion" placeholder="Ej: 5 horas">
        </div>

        <div class="input-group">
          <label>Cupos disponibles</label>
          <input type="number" [(ngModel)]="ruta.cupos" placeholder="20">
        </div>

        <div class="input-group full-width">
          <label>URL de imagen (Google / internet)</label>
          <input type="text" [(ngModel)]="ruta.imagen" placeholder="https://...">
        </div>

        <div class="input-group full-width">
          <label>Descripción</label>
          <textarea rows="5" [(ngModel)]="ruta.descripcion"
            placeholder="Describe la ruta, recomendaciones, nivel, etc...">
          </textarea>
        </div>

      </div>

      <button class="btn-crear" (click)="crearRuta()">
        ➕ Crear ruta
      </button>

    </div>

  </main>

</div>
